<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dynamicx</title>
    <style>
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // ── Right-click disable ──────────────────────────
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // ── Ctrl+Scroll zoom disable ─────────────────────
      document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });

      // ── Touch zoom disable ───────────────────────────
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      // ── Keyboard shortcuts block ─────────────────────
      document.addEventListener('keydown', function(e) {
        // Zoom block
        if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
          e.preventDefault();
        }
        // DevTools block
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
          (e.ctrlKey && ['u','U'].includes(e.key))
        ) {
          e.preventDefault();
          return false;
        }
      });

      // ── DevTools open detection ──────────────────────
      (function() {
        const threshold = 160;
        setInterval(function() {
          if (
            window.outerWidth - window.innerWidth > threshold ||
            window.outerHeight - window.innerHeight > threshold
          ) {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#060612;color:#7c3aed;font-family:sans-serif;font-size:18px;">Access Denied</div>';
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
